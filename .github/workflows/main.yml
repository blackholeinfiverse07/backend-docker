name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Clean existing files
        run: |
          sudo rm -rf /var/www/html/*

      - name: Clone repository to web root
        run: |
          sudo git clone https://github.com/ncd282005/backend-docker.git /var/www/html

      - name: Verify deployment
        run: |
          ls -la /var/www/html
